  <text x="10" y="88" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0B1931">Pressure bins</text>
  <rect x="10" y="96" width="16" height="16" rx="4" fill="rgba(0,78,152,0.15)" stroke="rgba(0,78,152,0.4)"/>
  <text x="32" y="108" font-size="10" fill="#334e70">0.0  0.2</text>
  <rect x="10" y="116" width="16" height="16" rx="4" fill="rgba(0,78,152,0.55)" stroke="rgba(0,78,152,0.4)"/>
  <text x="32" y="128" font-size="10" fill="#334e70">0.2  0.4</text>
